<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AdOS">
<link rel="manifest" href="/manifest.json">
<title>AdOS</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: #2a2a2a;
  --accent: #c9a84c;
  --accent-dim: #9e7e3a;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --live: #4caf50;
  --ready: #3b82f6;
  --processing: #f59e0b;
  --failed: #ef4444;
  --paused: #666;
  --r: 14px;
  --nav-h: 72px;
  --header-h: 56px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f2f2f7;
    --surface: #ffffff;
    --surface2: #f2f2f7;
    --border: #e0e0e0;
    --text: #111;
    --text2: #666;
    --text3: #aaa;
  }
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; }

#app { display: flex; flex-direction: column; height: 100%; }

/* HEADER */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(var(--safe-top) + 12px) 20px 12px;
  background: var(--bg); border-bottom: 1px solid var(--border);
  position: relative; z-index: 10; flex-shrink: 0;
}
.header-brand { display: flex; flex-direction: column; }
.header-brand h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--accent); }
.header-brand span { font-size: 11px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; }
.header-badge { display: flex; align-items: center; gap: 6px; }
.live-dot { width: 8px; height: 8px; background: var(--live); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.header-badge span { font-size: 12px; color: var(--text2); }

/* MAIN CONTENT */
main { flex: 1; overflow: hidden; position: relative; }
.tab-panel { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px); display: none; }
.tab-panel.active { display: block; }

/* BOTTOM NAV */
nav {
  display: flex; background: var(--surface); border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom); flex-shrink: 0;
  position: relative; z-index: 10;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 10px 0; border: none; background: none; color: var(--text2);
  cursor: pointer; min-height: 56px; transition: color 0.15s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 24px; height: 24px; }
.nav-btn span { font-size: 10px; font-weight: 500; letter-spacing: 0.3px; }

/* CARDS */
.card { background: var(--surface); border-radius: var(--r); margin: 12px 16px 0; overflow: hidden; border: 1px solid var(--border); }
.card-inner { padding: 14px 16px; }

/* STATUS BADGES */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
.badge-live { background: rgba(76,175,80,0.15); color: var(--live); }
.badge-ready { background: rgba(59,130,246,0.15); color: var(--ready); }
.badge-processing { background: rgba(245,158,11,0.15); color: var(--processing); }
.badge-failed { background: rgba(239,68,68,0.15); color: var(--failed); }
.badge-paused { background: rgba(102,102,102,0.15); color: var(--paused); }
.badge-format { background: var(--surface2); color: var(--text2); }

/* FILTER PILLS */
.filters { display: flex; gap: 8px; padding: 14px 16px 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.pill { padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; white-space: nowrap; min-height: 34px; transition: all 0.15s; }
.pill.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* QUEUE CARDS */
.queue-card { background: var(--surface); border-radius: var(--r); margin: 10px 16px 0; border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: opacity 0.15s; }
.queue-card:active { opacity: 0.7; }
.queue-card-main { padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start; }
.queue-thumb { width: 52px; height: 52px; border-radius: 8px; background: var(--surface2); flex-shrink: 0; object-fit: cover; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 24px; }
.queue-thumb img { width: 100%; height: 100%; object-fit: cover; }
.queue-info { flex: 1; min-width: 0; }
.queue-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
.queue-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.queue-date { font-size: 11px; color: var(--text2); margin-top: 6px; }
.queue-expand { border-top: 1px solid var(--border); padding: 12px 16px; display: none; background: var(--surface2); }
.queue-expand.open { display: block; }
.queue-caption { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 12px; }
.status-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.status-btn { padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; min-height: 36px; transition: all 0.15s; }
.status-btn:active { opacity: 0.7; }
.status-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }

/* EMPTY STATE */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text2); gap: 12px; text-align: center; }
.empty svg { width: 48px; height: 48px; opacity: 0.3; }
.empty p { font-size: 15px; }
.empty small { font-size: 13px; opacity: 0.7; }

/* LOADING */
.skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.loading-card { height: 80px; margin: 10px 16px 0; border-radius: var(--r); }

/* CREATE FORM */
.form-section { padding: 16px 16px 0; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; display: block; }
.form-input, .form-textarea {
  width: 100%; padding: 13px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; font-size: 15px; color: var(--text); outline: none;
  font-family: inherit; transition: border-color 0.15s;
}
.form-input:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { resize: none; min-height: 100px; line-height: 1.5; }
.format-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.format-btn {
  padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface);
  color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; text-align: center;
  display: flex; flex-direction: column; gap: 4px; align-items: center; min-height: 60px;
  transition: all 0.15s;
}
.format-btn.active { border-color: var(--accent); background: rgba(201,168,76,0.1); color: var(--accent); }
.format-btn span:first-child { font-size: 20px; }

/* TOGGLE */
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 14px; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); }
.toggle-row label { font-size: 14px; font-weight: 500; }
.toggle-row small { font-size: 12px; color: var(--text2); }
.toggle { position: relative; width: 48px; height: 28px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 28px; cursor: pointer; transition: 0.2s; }
.toggle-slider::before { content: ''; position: absolute; width: 22px; height: 22px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.2s; }
input:checked + .toggle-slider { background: var(--accent); }
input:checked + .toggle-slider::before { transform: translateX(20px); }

/* AI BUTTON */
.ai-btn { width: 100%; padding: 13px; background: var(--surface2); border: 1px dashed var(--accent-dim); border-radius: 10px; color: var(--accent); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 48px; transition: all 0.15s; }
.ai-btn:active { opacity: 0.7; }
.ai-btn.loading { opacity: 0.6; cursor: not-allowed; }

/* SUBMIT BUTTON */
.submit-btn { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 12px; color: #000; font-size: 16px; font-weight: 700; cursor: pointer; min-height: 52px; transition: opacity 0.15s; letter-spacing: -0.2px; }
.submit-btn:active { opacity: 0.8; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* FILE UPLOAD */
.upload-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 24px 16px; text-align: center; cursor: pointer; transition: border-color 0.15s; }
.upload-zone:active { border-color: var(--accent); }
.upload-zone input { display: none; }
.upload-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; }

/* INSIGHTS */
.insight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 16px 0; }
.insight-card { background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); padding: 14px; }
.insight-card.full { grid-column: 1 / -1; }
.insight-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.insight-value { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -1px; }
.insight-value.accent { color: var(--accent); }
.insight-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

.posts-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; margin: 12px 0 0; }
.post-thumb { aspect-ratio: 1; background: var(--surface2); overflow: hidden; cursor: pointer; position: relative; }
.post-thumb img { width: 100%; height: 100%; object-fit: cover; }
.post-thumb-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; padding: 6px; opacity: 0; transition: opacity 0.2s; }
.post-thumb:active .post-thumb-overlay { opacity: 1; }
.post-thumb-stat { color: white; font-size: 11px; font-weight: 600; }

/* SECTION TITLE */
.section-title { font-size: 13px; font-weight: 600; color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase; padding: 16px 16px 8px; }

/* TOAST */
.toast { position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px); left: 16px; right: 16px; background: #222; color: white; padding: 14px 16px; border-radius: 12px; font-size: 14px; font-weight: 500; z-index: 100; text-align: center; transform: translateY(20px); opacity: 0; transition: all 0.25s; pointer-events: none; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { background: var(--live); color: white; }
.toast.error { background: var(--failed); }

/* AI PROMPT MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; display: none; align-items: flex-end; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 20px calc(var(--safe-bottom) + 20px); width: 100%; }
.modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 14px; }
.modal-input { width: 100%; padding: 13px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; font-size: 15px; color: var(--text); outline: none; font-family: inherit; }
.modal-actions { display: flex; gap: 10px; margin-top: 12px; }
.modal-cancel { flex: 1; padding: 13px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 15px; font-weight: 600; cursor: pointer; }
.modal-generate { flex: 2; padding: 13px; border-radius: 10px; border: none; background: var(--accent); color: #000; font-size: 15px; font-weight: 700; cursor: pointer; }

.gap-8 { gap: 8px; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.flex { display: flex; }
.col { flex-direction: column; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-brand">
      <h1>AdOS</h1>
      <span>bornfromgrace</span>
    </div>
    <div class="header-badge">
      <div class="live-dot"></div>
      <span id="live-count">—</span>
    </div>
  </header>

  <main>
    <!-- QUEUE TAB -->
    <div class="tab-panel active" id="tab-queue">
      <div class="filters">
        <button class="pill active" onclick="setFilter('all')">All</button>
        <button class="pill" onclick="setFilter('Ready')">Ready</button>
        <button class="pill" onclick="setFilter('Processing')">Processing</button>
        <button class="pill" onclick="setFilter('Live')">Live</button>
        <button class="pill" onclick="setFilter('Paused')">Paused</button>
        <button class="pill" onclick="setFilter('Failed')">Failed</button>
      </div>
      <div id="queue-list">
        <div class="loading-card skeleton"></div>
        <div class="loading-card skeleton" style="margin-top:10px;opacity:.6"></div>
        <div class="loading-card skeleton" style="margin-top:10px;opacity:.3"></div>
      </div>
    </div>

    <!-- CREATE TAB -->
    <div class="tab-panel" id="tab-create">
      <div class="form-section">
        <label class="form-label">Format</label>
        <div class="format-grid">
          <button class="format-btn active" onclick="selectFormat(this,'Photo')"><span>📷</span><span>Photo</span></button>
          <button class="format-btn" onclick="selectFormat(this,'Reel')"><span>🎬</span><span>Reel</span></button>
          <button class="format-btn" onclick="selectFormat(this,'Story')"><span>▬</span><span>Story</span></button>
          <button class="format-btn" onclick="selectFormat(this,'Carousel')"><span>🎠</span><span>Carousel</span></button>
        </div>
      </div>

      <div class="form-section mt-12">
        <label class="form-label">Title</label>
        <input class="form-input" id="c-title" type="text" placeholder="Post title (internal)">
      </div>

      <div class="form-section mt-12">
        <label class="form-label">Media URL</label>
        <input class="form-input" id="c-media-url" type="url" placeholder="https://... (image or video URL)">
        <div class="upload-zone mt-8" onclick="document.getElementById('c-file').click()">
          <input type="file" id="c-file" accept="image/*,video/*" onchange="handleFileSelect(this)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin:0 auto 8px;display:block;opacity:0.4"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p style="font-size:13px;color:var(--text2)">Or tap to pick from camera roll</p>
          <img id="c-preview" class="upload-preview">
        </div>
      </div>

      <div class="form-section mt-12">
        <label class="form-label">Caption</label>
        <div class="ai-btn" id="ai-btn" onclick="openAIModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          Generate with AI
        </div>
        <textarea class="form-textarea mt-8" id="c-caption" placeholder="Write your caption or generate with AI above..." rows="4"></textarea>
        <input class="form-input mt-8" id="c-hashtags" type="text" placeholder="#hashtags (optional)">
      </div>

      <div class="form-section mt-12">
        <div class="toggle-row">
          <div>
            <label style="display:block">Run as Paid Ad</label>
            <small>Sends to Meta Ads instead of organic post</small>
          </div>
          <label class="toggle">
            <input type="checkbox" id="c-is-ad" onchange="toggleAdSet(this)">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="form-section mt-12" id="ad-set-section" style="display:none">
        <label class="form-label">Ad Set</label>
        <select class="form-input" id="c-ad-set">
          <option value="">Loading ad sets...</option>
        </select>
      </div>

      <div class="form-section mt-12">
        <label class="form-label">Schedule (optional)</label>
        <input class="form-input" id="c-publish-date" type="datetime-local">
      </div>

      <div class="form-section mt-12" style="padding-bottom:8px">
        <button class="submit-btn" id="submit-btn" onclick="createPost()">Add to Queue →</button>
      </div>
    </div>

    <!-- INSIGHTS TAB -->
    <div class="tab-panel" id="tab-insights">
      <div class="insight-grid">
        <div class="insight-card">
          <div class="insight-label">Followers</div>
          <div class="insight-value" id="i-followers">—</div>
        </div>
        <div class="insight-card">
          <div class="insight-label">Posts</div>
          <div class="insight-value" id="i-posts">—</div>
        </div>
        <div class="insight-card">
          <div class="insight-label">7d Spend</div>
          <div class="insight-value accent" id="i-spend">—</div>
          <div class="insight-sub" id="i-impressions"></div>
        </div>
        <div class="insight-card">
          <div class="insight-label">7d Reach</div>
          <div class="insight-value" id="i-reach">—</div>
          <div class="insight-sub" id="i-clicks"></div>
        </div>
      </div>
      <div class="section-title">Recent Posts</div>
      <div class="posts-grid" id="i-posts-grid">
        <div class="post-thumb skeleton"></div>
        <div class="post-thumb skeleton"></div>
        <div class="post-thumb skeleton"></div>
      </div>
    </div>
  </main>

  <nav>
    <button class="nav-btn active" id="nav-queue" onclick="switchTab('queue')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>Queue</span>
    </button>
    <button class="nav-btn" id="nav-create" onclick="switchTab('create')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Create</span>
    </button>
    <button class="nav-btn" id="nav-insights" onclick="switchTab('insights')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Insights</span>
    </button>
  </nav>
</div>

<!-- AI MODAL -->
<div class="modal-overlay" id="ai-modal" onclick="closeAIModal(event)">
  <div class="modal">
    <h3>Generate Caption</h3>
    <input class="modal-input" id="ai-prompt" placeholder="Describe the post (e.g. new hoodie drop, all black, heavy material)..." autocomplete="off">
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeAIModal()">Cancel</button>
      <button class="modal-generate" id="modal-gen-btn" onclick="generateCaption()">Generate ⚡</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// STATE
let currentTab = 'queue';
let currentFilter = 'all';
let records = [];
let selectedFormat = 'Photo';
let adSets = [];

// INIT
document.addEventListener('DOMContentLoaded', () => {
  loadQueue();
  loadAdSets();
  const shareUrl = new URLSearchParams(location.search).get('share_url');
  const shareText = new URLSearchParams(location.search).get('share_text');
  if (shareUrl || shareText) {
    switchTab('create');
    if (shareUrl) document.getElementById('c-media-url').value = shareUrl;
    if (shareText) document.getElementById('c-caption').value = shareText;
  }
});

// TABS
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  currentTab = tab;
  if (tab === 'insights') loadInsights();
}

// QUEUE
async function loadQueue() {
  const list = document.getElementById('queue-list');
  try {
    const url = currentFilter === 'all' ? '/api/queue' : `/api/queue?filter=${currentFilter}`;
    const res = await fetch(url);
    const data = await res.json();
    records = data.records || [];
    renderQueue();
    const live = records.filter(r => r.fields.Status === 'Live').length;
    document.getElementById('live-count').textContent = live + ' live';
  } catch (e) {
    list.innerHTML = '<div class="empty"><p>Failed to load queue</p><small>' + e.message + '</small></div>';
  }
}

function renderQueue() {
  const list = document.getElementById('queue-list');
  if (!records.length) {
    list.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      <p>No posts in queue</p>
      <small>Tap Create to add your first post</small>
    </div>`;
    return;
  }
  list.innerHTML = records.map(r => buildQueueCard(r)).join('');
}

function buildQueueCard(r) {
  const f = r.fields;
  const status = f.Status || 'Unknown';
  const statusClass = { Live: 'live', Ready: 'ready', Processing: 'processing', Failed: 'failed', Paused: 'paused' }[status] || 'paused';
  const formatEmoji = { Photo: '📷', Reel: '🎬', Story: '▬', Carousel: '🎠' }[f['Media Type']] || '📄';
  const isAd = f['Is Ad?'];
  const thumb = f['Media URL'] ? `<img src="${f['Media URL']}" onerror="this.style.display='none'" loading="lazy">` : formatEmoji;
  const date = f['Publish Date'] ? new Date(f['Publish Date']).toLocaleDateString('en-US', {month:'short',day:'numeric'}) : '';
  const caption = (f['Generated Caption'] || f['Caption'] || '').substring(0, 100);
  return `<div class="queue-card" onclick="toggleCard('${r.id}')">
    <div class="queue-card-main">
      <div class="queue-thumb">${f['Media URL'] ? `<img src="${f['Media URL']}" onerror="this.style.display='none';this.parentElement.innerHTML='${formatEmoji}'" loading="lazy">` : formatEmoji}</div>
      <div class="queue-info">
        <div class="queue-title">${f.Title || 'Untitled'}</div>
        <div class="queue-meta">
          <span class="badge badge-${statusClass}">${status}</span>
          <span class="badge badge-format">${f['Media Type'] || 'Photo'}</span>
          ${isAd ? '<span class="badge badge-format">💰 Ad</span>' : '<span class="badge badge-format">🌱 Organic</span>'}
        </div>
        ${date ? `<div class="queue-date">${date}</div>` : ''}
      </div>
    </div>
    <div class="queue-expand" id="expand-${r.id}">
      ${caption ? `<div class="queue-caption">${caption}${caption.length === 100 ? '…' : ''}</div>` : ''}
      <div class="status-actions">
        ${status !== 'Ready' ? `<button class="status-btn primary" onclick="updateStatus(event,'${r.id}','Ready')">Set Ready</button>` : ''}
        ${status !== 'Paused' ? `<button class="status-btn" onclick="updateStatus(event,'${r.id}','Paused')">Pause</button>` : ''}
        ${status !== 'Live' ? `<button class="status-btn" onclick="updateStatus(event,'${r.id}','Live')">Mark Live</button>` : ''}
        ${f['Meta Post ID'] ? `<button class="status-btn" onclick="copyId(event,'${f['Meta Post ID']}')">Copy Post ID</button>` : ''}
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  const el = document.getElementById('expand-' + id);
  el.classList.toggle('open');
}

async function updateStatus(e, id, status) {
  e.stopPropagation();
  try {
    await fetch('/api/queue', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ id, fields: { Status: status } })
    });
    showToast(`Set to ${status}`, 'success');
    await loadQueue();
  } catch (err) {
    showToast('Update failed', 'error');
  }
}

function copyId(e, id) {
  e.stopPropagation();
  navigator.clipboard?.writeText(id);
  showToast('Post ID copied');
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  loadQueue();
}

// CREATE
function selectFormat(btn, format) {
  document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedFormat = format;
}

function toggleAdSet(cb) {
  document.getElementById('ad-set-section').style.display = cb.checked ? 'block' : 'none';
}

async function loadAdSets() {
  try {
    const res = await fetch(`https://api.airtable.com/v0/appkhSYpf68REVHnp/tblalUrkcAphQpBcL?fields[]=Ad+Set+Name&fields[]=Status&filterByFormula={Status}='Active'`);
    // Note: This call goes directly to Airtable from client - only works with CORS token
    // In production the queue API proxies this - using static fallback for now
  } catch {}
}

function handleFileSelect(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('c-preview');
    preview.src = e.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
  showToast('Photo selected — paste a CDN URL for the Media URL field to auto-post');
}

async function createPost() {
  const btn = document.getElementById('submit-btn');
  const title = document.getElementById('c-title').value.trim();
  const mediaUrl = document.getElementById('c-media-url').value.trim();
  const caption = document.getElementById('c-caption').value.trim();
  const hashtags = document.getElementById('c-hashtags').value.trim();
  const isAd = document.getElementById('c-is-ad').checked;
  const publishDate = document.getElementById('c-publish-date').value;

  if (!title) return showToast('Add a title', 'error');
  if (!mediaUrl) return showToast('Add a Media URL', 'error');

  btn.disabled = true;
  btn.textContent = 'Adding…';

  const fields = {
    'Title': title,
    'Media URL': mediaUrl,
    'Media Type': selectedFormat,
    'Caption': caption,
    'Hashtags': hashtags,
    'Is Ad?': isAd,
    'Status': 'Ready',
    'Brand': 'bornfromgrace'
  };
  if (publishDate) fields['Publish Date'] = publishDate;

  try {
    const res = await fetch('/api/queue', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(fields)
    });
    const data = await res.json();
    if (data.records) {
      showToast('Added to queue ✓', 'success');
      resetForm();
      switchTab('queue');
      await loadQueue();
    } else {
      showToast('Error: ' + JSON.stringify(data).substring(0, 80), 'error');
    }
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Add to Queue →';
  }
}

function resetForm() {
  ['c-title','c-media-url','c-caption','c-hashtags'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('c-publish-date').value = '';
  document.getElementById('c-is-ad').checked = false;
  document.getElementById('ad-set-section').style.display = 'none';
  document.getElementById('c-preview').style.display = 'none';
  document.querySelectorAll('.format-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  selectedFormat = 'Photo';
}

// AI CAPTION
function openAIModal() {
  document.getElementById('ai-modal').classList.add('show');
  setTimeout(() => document.getElementById('ai-prompt').focus(), 100);
}
function closeAIModal(e) {
  if (!e || e.target.id === 'ai-modal') document.getElementById('ai-modal').classList.remove('show');
}
async function generateCaption() {
  const prompt = document.getElementById('ai-prompt').value.trim();
  if (!prompt) return showToast('Describe the post first', 'error');
  const btn = document.getElementById('modal-gen-btn');
  btn.textContent = 'Generating…'; btn.disabled = true;
  try {
    const res = await fetch('/api/caption', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ prompt, format: selectedFormat })
    });
    const data = await res.json();
    if (data.caption) {
      document.getElementById('c-caption').value = data.caption;
      if (data.hashtags) document.getElementById('c-hashtags').value = data.hashtags;
      document.getElementById('ai-modal').classList.remove('show');
      document.getElementById('ai-prompt').value = '';
      showToast('Caption generated ✓', 'success');
    } else {
      showToast('Generation failed', 'error');
    }
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.textContent = 'Generate ⚡'; btn.disabled = false;
  }
}

// INSIGHTS
async function loadInsights() {
  try {
    const res = await fetch('/api/insights');
    const data = await res.json();
    const fmt = n => n >= 1000 ? (n/1000).toFixed(1)+'K' : String(n||0);
    document.getElementById('i-followers').textContent = fmt(data.account?.followers);
    document.getElementById('i-posts').textContent = fmt(data.account?.media_count);
    document.getElementById('i-spend').textContent = data.spend?.spend ? '$' + parseFloat(data.spend.spend).toFixed(2) : '$0.00';
    document.getElementById('i-impressions').textContent = fmt(data.spend?.impressions) + ' impressions';
    document.getElementById('i-reach').textContent = fmt(data.spend?.reach);
    document.getElementById('i-clicks').textContent = fmt(data.spend?.clicks) + ' clicks';
    const grid = document.getElementById('i-posts-grid');
    if (data.posts?.length) {
      grid.innerHTML = data.posts.map(p => {
        const img = p.thumbnail_url || p.media_url || '';
        const likes = p.like_count || 0;
        return `<div class="post-thumb"><img src="${img}" loading="lazy" onerror="this.parentElement.style.background='var(--surface2)'">
          <div class="post-thumb-overlay"><span class="post-thumb-stat">♥ ${likes}</span></div></div>`;
      }).join('');
    } else {
      grid.innerHTML = '<div style="grid-column:1/-1;padding:20px;text-align:center;color:var(--text2);font-size:13px">No posts yet</div>';
    }
  } catch (e) {
    showToast('Could not load insights', 'error');
  }
}

// TOAST
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 2800);
}

// AI PROMPT — keyboard submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('ai-modal').classList.contains('show')) generateCaption();
  if (e.key === 'Escape') closeAIModal();
});
</script>
